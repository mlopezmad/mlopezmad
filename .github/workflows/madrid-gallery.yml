name: Actualizar galeria Madrid

on:
  push:
    paths:
      - 'images/madrid/*.jpg'
      - 'images/madrid/*.jpeg'
      - 'images/madrid/*.JPG'
      - 'images/madrid/*.JPEG'
      - 'images/madrid/*.png'
      - 'images/madrid/*.PNG'

jobs:
  update-gallery:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar fotos nuevas
        id: fotos
        run: |
          NEW_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep -Ei '^images/madrid/.*\.(jpg|jpeg|png)$' || true)
          COUNT=$(echo "$NEW_FILES" | sed '/^\s*$/d' | wc -l)

          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -eq 1 ]; then
            echo "subject=Nueva fotografía en Madrid" >> $GITHUB_OUTPUT
            echo "message=He publicado una nueva fotografía en la galería de Madrid." >> $GITHUB_OUTPUT
          else
            echo "subject=Nuevas fotografías en Madrid" >> $GITHUB_OUTPUT
            echo "message=He publicado $COUNT nuevas fotografías en la galería de Madrid." >> $GITHUB_OUTPUT
          fi

      - name: Generar galeria.json
        run: |
          cd images/madrid

          echo '{"imagenes":[' > galeria.json

          first=true

          for file in $(git log --name-only --pretty=format: -- . | grep -Ei '\.(jpg|jpeg|png)$' | awk '!seen[$0]++'); do
            file=$(basename "$file")

            if [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> galeria.json
              fi

              echo "{\"archivo\":\"$file\",\"tipo\":\"bn\"}" >> galeria.json
            fi
          done

          echo ']}' >> galeria.json

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images/madrid/galeria.json

          git diff --cached --quiet || git commit -m "Actualizar galeria Madrid"

      - name: Push
        run: |
          git push

            - name: Enviar newsletter
        if: steps.fotos.outputs.count != '0'
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SUBJECT: ${{ steps.fotos.outputs.subject }}
          MESSAGE: ${{ steps.fotos.outputs.message }}
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "https://api.buttondown.email/v1/emails" \
            -H "Authorization: Token $BUTTONDOWN_API_KEY" \
            -H "Content-Type: application/json" \
            -H "X-Buttondown-Live-Dangerously: true" \
            -d @- <<EOF
          {
            "subject": "$SUBJECT",
            "body": "Hola,\n\n$MESSAGE\n\nPuedes verla aquí:\n\nhttps://mlopezmad.es/madrid.html\n\nMiguel López",
            "status": "about_to_send"
          }
          EOF
          )

          echo "$RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error enviando newsletter"
            exit 1
          fi