name: Actualizar galeria Madrid

on:
  push:
    paths:
      - 'images/madrid/*.jpg'
      - 'images/madrid/*.jpeg'
      - 'images/madrid/*.JPG'
      - 'images/madrid/*.JPEG'
      - 'images/madrid/*.png'
      - 'images/madrid/*.PNG'

jobs:
  update-gallery:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar fotos nuevas
        id: fotos
        run: |
          NEW_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep -Ei '^images/madrid/.*\.(jpg|jpeg|png)$' || true)
          COUNT=$(echo "$NEW_FILES" | sed '/^\s*$/d' | wc -l)
          DATE=$(date +"%d/%m/%Y %H:%M")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          FIRST_FILE=$(echo "$NEW_FILES" | head -n 1 | xargs -n 1 basename)

          IMAGE_URL="https://mlopezmad.es/images/madrid/$FIRST_FILE"
          GALLERY_URL="https://mlopezmad.es/madrid.html"

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "gallery_url=$GALLERY_URL" >> $GITHUB_OUTPUT

          if [ "$COUNT" -eq 1 ]; then
            echo "subject=Nueva fotografía en Madrid · $SHORT_SHA" >> $GITHUB_OUTPUT
            echo "message=Una nueva imagen ha sido añadida a la colección Madrid." >> $GITHUB_OUTPUT
          else
            echo "subject=Nuevas fotografías en Madrid · $SHORT_SHA" >> $GITHUB_OUTPUT
            echo "message=He añadido $COUNT nuevas fotografías a la colección Madrid." >> $GITHUB_OUTPUT
          fi

      - name: Generar galeria.json
        run: |
          cd images/madrid

          echo '{"imagenes":[' > galeria.json

          first=true

          for file in $(git log --name-only --pretty=format: -- . | grep -Ei '\.(jpg|jpeg|png)$' | awk '!seen[$0]++'); do
            file=$(basename "$file")

            if [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> galeria.json
              fi

              echo "{\"archivo\":\"$file\",\"tipo\":\"bn\"}" >> galeria.json
            fi
          done

          echo ']}' >> galeria.json

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images/madrid/galeria.json

          git diff --cached --quiet || git commit -m "Actualizar galeria Madrid"

      - name: Push
        run: |
          git push

      - name: Enviar newsletter
        if: steps.fotos.outputs.count != '0'
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SUBJECT: ${{ steps.fotos.outputs.subject }}
          MESSAGE: ${{ steps.fotos.outputs.message }}
          IMAGE_URL: ${{ steps.fotos.outputs.image_url }}
          GALLERY_URL: ${{ steps.fotos.outputs.gallery_url }}
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "https://api.buttondown.email/v1/emails" \
            -H "Authorization: Token $BUTTONDOWN_API_KEY" \
            -H "Content-Type: application/json" \
            -H "X-Buttondown-Live-Dangerously: true" \
            -d @- <<EOF
          {
            "subject": "$SUBJECT",
            "body": "<div style=\"max-width:640px;margin:0 auto;font-family:Georgia,serif;color:#111;line-height:1.6;\"><img src=\"$IMAGE_URL\" alt=\"Nueva fotografía en Madrid\" style=\"width:100%;height:auto;display:block;margin-bottom:28px;\"><h1 style=\"font-size:28px;font-weight:400;margin:0 0 16px;\">Nueva fotografía en Madrid</h1><p style=\"font-size:16px;color:#555;margin:0 0 28px;\">$MESSAGE</p><p style=\"margin:34px 0;\"><a href=\"$GALLERY_URL\" style=\"display:inline-block;background:#111;color:#fff;text-decoration:none;padding:14px 24px;font-size:15px;\">Ver fotografía →</a></p><p style=\"font-size:13px;color:#999;margin-top:40px;\">Miguel López · Fotografía<br>mlopezmad.es</p></div>",
            "status": "about_to_send"
          }
          EOF
          )

          echo "$RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error enviando newsletter"
            exit 1
          fi