name: Actualizar galeria Madrid

on:
  push:
    paths:
      - 'images/madrid/*.jpg'
      - 'images/madrid/*.jpeg'
      - 'images/madrid/*.JPG'
      - 'images/madrid/*.JPEG'
      - 'images/madrid/*.png'
      - 'images/madrid/*.PNG'

jobs:
  update-gallery:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generar galeria.json
        run: |
          cd images/madrid

          echo '{"imagenes":[' > galeria.json

          first=true

          for file in $(git log --name-only --pretty=format: -- . | grep -Ei '\.(jpg|jpeg|png)$' | awk '!seen[$0]++'); do
            file=$(basename "$file")

            if [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> galeria.json
              fi

              echo "{\"archivo\":\"$file\",\"tipo\":\"bn\"}" >> galeria.json
            fi
          done

          echo ']}' >> galeria.json

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images/madrid/galeria.json

          git diff --cached --quiet || git commit -m "Actualizar galeria Madrid"

      - name: Push
        run: |
          git push