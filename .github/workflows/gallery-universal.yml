name: Actualizar galerías

on:
  push:
    paths:
      - 'images/**/*.jpg'
      - 'images/**/*.jpeg'
      - 'images/**/*.JPG'
      - 'images/**/*.JPEG'
      - 'images/**/*.png'
      - 'images/**/*.PNG'

jobs:
  update-gallery:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar foto nueva
        id: foto
        run: |
          NEW_FILE=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} \
            | grep -Ei '^images/.+\.(jpg|jpeg|png)$' \
            | head -n 1)

          if [ -z "$NEW_FILE" ]; then
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          FOLDER=$(echo "$NEW_FILE" | cut -d'/' -f2)

          # soporte iphone4s/cadiz
          if [ "$FOLDER" = "iphone4s" ]; then
            SUBFOLDER=$(echo "$NEW_FILE" | cut -d'/' -f3)
            COLLECTION="$SUBFOLDER"
            GALLERY_URL="https://mlopezmad.es/${SUBFOLDER}.html"
          else
            COLLECTION="$FOLDER"
            GALLERY_URL="https://mlopezmad.es/${FOLDER}.html"
          fi

          FILE_NAME=$(basename "$NEW_FILE")

          IMAGE_URL="https://raw.githubusercontent.com/mlopezmad/mlopezmad/main/$NEW_FILE"

          echo "count=1" >> $GITHUB_OUTPUT
          echo "collection=$COLLECTION" >> $GITHUB_OUTPUT
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "gallery_url=$GALLERY_URL" >> $GITHUB_OUTPUT

          echo "message=He añadido una nueva fotografía a la colección ${COLLECTION}." >> $GITHUB_OUTPUT

      - name: Esperar antes de enviar newsletter
        if: steps.foto.outputs.count != '0'
        run: |
          sleep 60

      - name: Enviar newsletter
        if: steps.foto.outputs.count != '0'
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          COLLECTION: ${{ steps.foto.outputs.collection }}
          MESSAGE: ${{ steps.foto.outputs.message }}
          IMAGE_URL: ${{ steps.foto.outputs.image_url }}
          GALLERY_URL: ${{ steps.foto.outputs.gallery_url }}
          UNIQUE_ID: ${{ github.sha }}

        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST "https://api.buttondown.email/v1/emails" \
          -H "Authorization: Token $BUTTONDOWN_API_KEY" \
          -H "Content-Type: application/json" \
          -H "X-Buttondown-Live-Dangerously: true" \
          -d @- <<EOF
          {
            "subject": "Nueva fotografía en ${COLLECTION}",
            "body": "<div style=\"display:none;font-size:1px;color:#ffffff;max-height:0;max-width:0;opacity:0;overflow:hidden;\">$UNIQUE_ID</div><table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"background:#ffffff;color:#111;font-family:Georgia,serif;\"><tr><td align=\"center\" style=\"padding:38px 22px;\"><table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"max-width:640px;\"><tr><td align=\"center\" style=\"padding-bottom:24px;\"><h1 style=\"font-size:34px;line-height:1.15;font-weight:400;margin:0;color:#111;\">Nueva fotografía en ${COLLECTION}</h1><p style=\"font-family:Arial,sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin:18px 0 0;\">Miguel López — Fotografía</p></td></tr><tr><td align=\"center\" style=\"padding:10px 0 34px;\"><img src=\"$IMAGE_URL\" alt=\"Fotografía\" width=\"430\" style=\"width:100%;max-width:430px;height:auto;display:block;border:0;\"></td></tr><tr><td align=\"left\" style=\"padding:0 24px 28px;\"><p style=\"font-size:18px;line-height:1.7;color:#333;margin:0 0 14px;\">$MESSAGE</p><p style=\"font-size:18px;line-height:1.7;color:#333;margin:0;\">Espero que la disfrutes.</p></td></tr><tr><td align=\"center\" style=\"padding:8px 24px 42px;\"><a href=\"$GALLERY_URL\" style=\"font-family:Georgia,serif;font-size:20px;color:#111111;text-decoration:underline;\">Ver fotografía →</a></td></tr><tr><td align=\"center\" style=\"border-top:1px solid #e5e5e5;padding-top:26px;\"><p style=\"font-size:16px;color:#888;margin:0 0 6px;\">Miguel López · Fotografía</p><p style=\"font-size:15px;margin:0;\"><a href=\"https://mlopezmad.es\" style=\"color:#111;text-decoration:underline;\">mlopezmad.es</a></p></td></tr></table></td></tr></table>",
            "status": "about_to_send"
          }
          EOF
          )

          echo "$RESPONSE"
