<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madrid - mlopezmad</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#fafafa;
    font-family:Georgia,serif;
    color:#111;
}

header{
    text-align:center;
    padding:60px 20px 35px;
}

header h1{
    font-size:3rem;
    font-weight:400;
}

header p{
    color:#777;
    margin-top:10px;
}

.filtros{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-bottom:45px;
    flex-wrap:wrap;
}

.filtros button{
    background:none;
    border:none;
    font-family:Georgia,serif;
    font-size:1rem;
    color:#777;
    cursor:pointer;
}

.filtros button.activo{
    color:#111;
    text-decoration:underline;
}

.galeria{
    max-width:1400px;
    margin:0 auto 80px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.galeria img{
    width:100%;
    display:block;
    cursor:pointer;
}

img{
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
}

.volver{
    display:block;
    text-align:center;
    margin:50px 0;
    text-decoration:none;
    color:#111;
    font-size:1.1rem;
}

.footer{
    text-align:center;
    color:#999;
    font-size:.9rem;
    line-height:1.7;
    padding:40px 20px 60px;
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    z-index:999;
    background:rgba(0,0,0,.97);
    align-items:center;
    justify-content:center;
    padding:20px;
}

.lightbox.active{display:flex;}

.lightbox img{
    max-width:100%;
    max-height:88vh;
    object-fit:contain;
    opacity:1;
    transform:translateX(0);
    transition:opacity .25s ease, transform .25s ease;
}

.lightbox img.fade-left{
    opacity:0;
    transform:translateX(-18px);
}

.lightbox img.fade-right{
    opacity:0;
    transform:translateX(18px);
}

.cerrar{
    position:fixed;
    top:22px;
    right:28px;
    color:#fff;
    font-size:2.2rem;
    cursor:pointer;
    font-family:Arial,sans-serif;
    z-index:1001;
    opacity:0;
    transition:opacity .4s ease;
}

.nav-btn{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    color:rgba(255,255,255,.75);
    background:none;
    border:none;
    font-size:4rem;
    line-height:1;
    cursor:pointer;
    z-index:1001;
    opacity:0;
    transition:opacity .4s ease, color .3s ease;
}

.nav-btn:hover{color:#fff;}

.prev{left:22px;}
.next{right:22px;}

.contador{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,.8);
    font-family:Arial,sans-serif;
    font-size:.9rem;
    letter-spacing:1px;
    z-index:1001;
    opacity:0;
    transition:opacity .4s ease;
}

.lightbox.show-controls .nav-btn,
.lightbox.show-controls .contador,
.lightbox.show-controls .cerrar{
    opacity:1;
}

@media(max-width:768px){
    header h1{font-size:2.8rem;}

    .galeria{
        grid-template-columns:1fr;
        padding:0 16px;
        gap:24px;
    }

    .nav-btn{font-size:3.2rem;}
    .prev{left:10px;}
    .next{right:10px;}
}
</style>
</head>

<body>

<header>
    <h1>Madrid</h1>
    <p>Fotografía de calle</p>
</header>

<div class="filtros">
    <button class="activo" data-filtro="todas">Todas</button>
    <button data-filtro="bn">B&N</button>
    <button data-filtro="color">Color</button>
</div>

<div class="galeria" id="galeria"></div>

<a class="volver" href="portfolio.html">← Volver a fotografías</a>

<footer class="footer">
    <p>© 2026 mlopezmad</p>
    <p>Madrid · España</p>
</footer>

<div class="lightbox" id="lightbox">
    <span class="cerrar" id="cerrar">×</span>
    <button class="nav-btn prev" id="prev">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button class="nav-btn next" id="next">›</button>
    <div class="contador" id="contador">1 / 1</div>
</div>

<script>
const RUTA = "images/madrid/";
let todasLasImagenes = [];
let imagenesFiltradas = [];
let indiceActual = 0;
let touchStartX = 0;
let touchEndX = 0;
let controlsTimer;

const galeria = document.getElementById("galeria");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const cerrar = document.getElementById("cerrar");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
const contador = document.getElementById("contador");
const botonesFiltro = document.querySelectorAll(".filtros button");

fetch(RUTA + "galeria.json")
    .then(respuesta => respuesta.json())
    .then(datos => {
        todasLasImagenes = datos.imagenes;
        aplicarFiltro("todas");
    });

function aplicarFiltro(filtro){
    if(filtro === "todas"){
        imagenesFiltradas = todasLasImagenes;
    }else{
        imagenesFiltradas = todasLasImagenes.filter(img => img.tipo === filtro);
    }

    galeria.innerHTML = "";

    imagenesFiltradas.forEach((imagen, index) => {
        const img = document.createElement("img");
        img.src = RUTA + imagen.archivo;
        img.alt = "Fotografía de Madrid";
        img.setAttribute("draggable","false");
        img.addEventListener("click", () => abrirLightbox(index));
        galeria.appendChild(img);
    });
}

botonesFiltro.forEach(boton => {
    boton.addEventListener("click", () => {
        botonesFiltro.forEach(b => b.classList.remove("activo"));
        boton.classList.add("activo");
        aplicarFiltro(boton.dataset.filtro);
    });
});

function mostrarControles(){
    lightbox.classList.add("show-controls");
    clearTimeout(controlsTimer);

    controlsTimer = setTimeout(() => {
        lightbox.classList.remove("show-controls");
    }, 2000);
}

function abrirLightbox(indice){
    indiceActual = indice;
    actualizarImagen();
    lightbox.classList.add("active");
    mostrarControles();
}

function cerrarLightbox(){
    lightbox.classList.remove("active");
    lightbox.classList.remove("show-controls");
}

function actualizarImagen(){
    lightboxImg.src = RUTA + imagenesFiltradas[indiceActual].archivo;
    contador.textContent = (indiceActual + 1) + " / " + imagenesFiltradas.length;
}

function cambiarImagen(nuevoIndice, direccion){
    lightboxImg.classList.add(direccion === "next" ? "fade-left" : "fade-right");

    setTimeout(() => {
        indiceActual = nuevoIndice;
        actualizarImagen();
        lightboxImg.classList.remove("fade-left", "fade-right");
        mostrarControles();
    }, 200);
}

function imagenAnterior(){
    const nuevoIndice = (indiceActual - 1 + imagenesFiltradas.length) % imagenesFiltradas.length;
    cambiarImagen(nuevoIndice, "prev");
}

function imagenSiguiente(){
    const nuevoIndice = (indiceActual + 1) % imagenesFiltradas.length;
    cambiarImagen(nuevoIndice, "next");
}

cerrar.addEventListener("click", cerrarLightbox);
prev.addEventListener("click", imagenAnterior);
next.addEventListener("click", imagenSiguiente);

lightbox.addEventListener("click", e => {
    mostrarControles();
    if(e.target === lightbox) cerrarLightbox();
});

lightbox.addEventListener("mousemove", mostrarControles);

lightbox.addEventListener("touchstart", e => {
    mostrarControles();
    touchStartX = e.changedTouches[0].screenX;
});

lightbox.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    const diferencia = touchEndX - touchStartX;

    if(diferencia > 50) imagenAnterior();
    if(diferencia < -50) imagenSiguiente();
});

document.addEventListener("keydown", e => {
    if(!lightbox.classList.contains("active")) return;

    mostrarControles();

    if(e.key === "ArrowLeft") imagenAnterior();
    if(e.key === "ArrowRight") imagenSiguiente();
    if(e.key === "Escape") cerrarLightbox();
});

document.addEventListener("contextmenu", e => {
    e.preventDefault();
});
</script>

</body>
</html>
