<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mlopezmad Studio</title>

<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png">
<link rel="shortcut icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#fafafa;
    color:#111;
    font-family:Georgia,serif;
    min-height:100vh;
}

.studio{
    max-width:820px;
    margin:0 auto;
    padding:70px 24px;
}

.header{
    text-align:center;
    margin-bottom:60px;
}

.header h1{
    font-size:3rem;
    font-weight:400;
}

.header p{
    color:#888;
    margin-top:10px;
    font-size:1rem;
}

.card{
    background:#fff;
    border:1px solid #e8e8e8;
    padding:32px;
    margin-bottom:28px;
}

.card h2{
    font-size:1.7rem;
    font-weight:400;
    margin-bottom:24px;
}

label{
    display:block;
    color:#777;
    margin-bottom:10px;
    font-size:.95rem;
}

input,
select{
    width:100%;
    border:1px solid #ddd;
    background:#fff;
    padding:14px;
    font-family:Georgia,serif;
    font-size:1rem;
    margin-bottom:22px;
}

button{
    width:100%;
    border:1px solid #111;
    background:#111;
    color:#fff;
    padding:15px;
    font-family:Georgia,serif;
    font-size:1rem;
    cursor:pointer;
}

button:disabled{
    opacity:.35;
    cursor:not-allowed;
}

.hidden{
    display:none;
}

.status{
    color:#777;
    line-height:1.7;
    margin-top:20px;
}

.preview{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:12px;
    margin-top:18px;
}

.preview img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
}

.footer{
    text-align:center;
    color:#aaa;
    margin-top:60px;
    font-size:.85rem;
}

@media(max-width:768px){
    .studio{
        padding:52px 20px;
    }

    .header h1{
        font-size:2.4rem;
    }

    .card{
        padding:26px;
    }
}
</style>
</head>

<body>

<main class="studio">

<header class="header">
    <h1>mlopezmad Studio</h1>
    <p>Photography Publisher</p>
</header>

<section id="login" class="card">
    <h2>Acceso privado</h2>

    <label for="password">Contraseña</label>
    <input id="password" type="password" autocomplete="current-password">

    <button id="loginBtn">Entrar</button>

    <p id="loginStatus" class="status"></p>
</section>

<section id="panel" class="hidden">

    <div class="card">
        <h2>Nueva publicación</h2>

        <label for="collection">Colección</label>
        <select id="collection">
            <option value="images/madrid">Madrid</option>
            <option value="images/middelburg">Middelburg</option>
            <option value="images/rotterdam">Rotterdam</option>
            <option value="images/hall-of-fame">Hall of Fame</option>
            <option value="images/iphone4s/cadiz">iPhone 4s · Cádiz</option>
            <option value="images/iphone4s/caceres">iPhone 4s · Cáceres</option>
        </select>

        <label for="files">Fotografías</label>
        <input id="files" type="file" accept="image/jpeg,image/png" multiple>

        <div id="preview" class="preview"></div>

        <p id="fileStatus" class="status">No hay fotografías seleccionadas.</p>

        <button id="publishBtn" disabled>Publicar</button>

        <p id="publishStatus" class="status"></p>
    </div>

</section>

<footer class="footer">
    © Miguel López · mlopezmad
</footer>

</main>

<script src="admin.js?v=1"></script>

</body>
</html>
