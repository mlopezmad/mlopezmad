<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotografías - mlopezmad</title>

<link rel="stylesheet" href="style.css">

<style>

.portfolio-list{
    max-width:760px;
    margin:0 auto 90px;
    padding:0 28px;
}

.portfolio-item{
    display:block;
    padding:34px 0;
    border-bottom:1px solid #ececec;
    color:#111;
    text-decoration:none;
    transition:.25s ease;
}

.portfolio-item:hover{
    opacity:.65;
}

.portfolio-item h2{
    font-size:2rem;
    font-weight:400;
    margin:0;
}

.portfolio-item p{
    margin:10px 0 18px;
    color:#888;
    font-size:1.05rem;
    line-height:1.6;
}

.portfolio-meta{
    font-size:.95rem;
    color:#999;
    letter-spacing:.5px;
}

.portfolio-empty{
    text-align:center;
    color:#888;
    margin-top:40px;
}

.volver{
    display:block;
    text-align:center;
    margin:80px 0;
    text-decoration:none;
    color:#111;
    font-size:1.1rem;
}

@media(max-width:768px){

    .portfolio-list{
        padding:0 24px;
    }

    .portfolio-item{
        padding:28px 0;
    }

    .portfolio-item h2{
        font-size:1.8rem;
    }

}

</style>
</head>

<body>

<section class="intro">
    <h1>Fotografías</h1>
    <p>Archivo fotográfico</p>
</section>

<section class="portfolio-list" id="portfolioList">
    <p class="portfolio-empty">Cargando fotografías...</p>
</section>

<a class="volver" href="index.html">← Volver</a>

<script>

async function cargarPortfolio(){

    const contenedor=document.getElementById("portfolioList");

    try{

        const response=await fetch("collections.json?t="+Date.now());
        const data=await response.json();

        const colecciones=(data.collections||[])
            .filter(c=>c.type==="portfolio");

        if(!colecciones.length){
            contenedor.innerHTML='<p class="portfolio-empty">No hay colecciones disponibles.</p>';
            return;
        }

        const filas=await Promise.all(
            colecciones.map(async coleccion=>{

                let total=null;

                try{
                    const g=await fetch(coleccion.json+"?t="+Date.now());
                    const gd=await g.json();
                    total=(gd.imagenes||[]).length;
                }catch(e){}

                const descripcion=
                    coleccion.title==="Editor's Choice"
                        ? "Una selección personal"
                        : (coleccion.description||"");

                const contador=
                    total===null
                    ? ""
                    : `${total} ${total===1?"fotografía":"fotografías"}`;

                return `

<a class="portfolio-item" href="${coleccion.url}">

<h2>${coleccion.title}</h2>

${descripcion?`<p>${descripcion}</p>`:""}

<div class="portfolio-meta">
${contador} →
</div>

</a>

`;

            })

        );

        filas.push(`

<a class="portfolio-item" href="iphone4s.html">

<h2>iPhone 4s</h2>

<p>Transfer Filter Project</p>

<div class="portfolio-meta">
Proyecto →
</div>

</a>

`);

        contenedor.innerHTML=filas.join("");

    }catch(e){

        contenedor.innerHTML='<p class="portfolio-empty">No se pudo cargar el portfolio.</p>';

    }

}

cargarPortfolio();

</script>

</body>
</html>
