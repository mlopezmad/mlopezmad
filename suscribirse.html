<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suscribirse - mlopezmad</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="intro">
    <h1>Suscribirse</h1>

    <p class="subscribe-text">
        Recibe un correo cuando publique nuevas fotografías, galerías o proyectos personales.
    </p>

    <form
        action="https://buttondown.com/api/emails/embed-subscribe/mlopezmad"
        method="post"
        class="subscribe-form"
    >
        <input
            type="email"
            name="email"
            placeholder="Tu correo electrónico"
            required
        >

        <input
            type="submit"
            value="Suscribirse"
        >
    </form>

    <p class="subscribe-note">
        Sin publicidad. Solo nuevas fotografías y proyectos.
    </p>

</section>

<nav class="menu">
    <a href="index.html">← Volver</a>
</nav>

</body>
</html>
