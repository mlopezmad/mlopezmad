<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall of Fame - mlopezmad</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fafafa;
    font-family:Georgia,serif;
    color:#111;
}

header{
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:3rem;
    font-weight:400;
}

header p{
    color:#777;
    margin-top:10px;
}

.galeria{
    max-width:1400px;
    margin:0 auto 80px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.galeria img{
    width:100%;
    display:block;
    cursor:pointer;
    transition:.3s;
}

.galeria img:hover{
    opacity:.85;
}

.volver{
    display:block;
    text-align:center;
    margin:50px 0;
    text-decoration:none;
    color:#111;
    font-size:1.1rem;
}

.lightbox{
    display:none;
    position:fixed;
    z-index:999;
    inset:0;
    background:rgba(0,0,0,.95);
    align-items:center;
    justify-content:center;
    padding:20px;
}

.lightbox img{
    max-width:100%;
    max-height:90vh;
    object-fit:contain;
}

.lightbox.active{
    display:flex;
}

.cerrar{
    position:fixed;
    top:20px;
    right:25px;
    color:white;
    font-size:2rem;
    cursor:pointer;
    font-family:Arial,sans-serif;
}

@media(max-width:768px){
    header h1{
        font-size:2.6rem;
    }

    .galeria{
        grid-template-columns:1fr;
        padding:0 16px;
        gap:24px;
    }
}
</style>

</head>
<body>

<header>
    <h1>Hall of Fame</h1>
    <p>Una selección personal</p>
</header>

<div class="galeria">
<img src="images/hall-of-fame/novia-mercedes.jpg" alt="Novia y Mercedes">
<img src="images/hall-of-fame/rebajas.jpg" alt="Rebajas">
<img src="images/hall-of-fame/puerta-alcala.jpg" alt="Puerta de Alcalá">
<img src="images/hall-of-fame/silueta-calle.jpg" alt="Silueta en la calle">
<img src="images/hall-of-fame/baile-madrid.jpg" alt="Baile Madrid">
</div>

<a class="volver" href="index.html">← Volver</a>

<div class="lightbox" id="lightbox">
    <span class="cerrar" id="cerrar">×</span>
    <img id="lightbox-img" src="" alt="">
</div>

<script>
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const cerrar = document.getElementById("cerrar");

document.querySelectorAll(".galeria img").forEach(img => {
    img.addEventListener("click", () => {
        lightboxImg.src = img.src;
        lightbox.classList.add("active");
    });
});

cerrar.addEventListener("click", () => {
    lightbox.classList.remove("active");
});

lightbox.addEventListener("click", e => {
    if(e.target === lightbox){
        lightbox.classList.remove("active");
    }
});
</script>

</body>
</html>
