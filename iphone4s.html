<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone 4s - mlopezmad</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#fafafa;
    font-family:Georgia,serif;
    color:#111;
}

header{
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:3rem;
    font-weight:400;
}

header p{
    color:#777;
    margin-top:10px;
}

.galeria{
    max-width:1400px;
    margin:0 auto 80px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.galeria img{
    width:100%;
    display:block;
    cursor:pointer;
}

.volver{
    display:block;
    text-align:center;
    margin:50px 0;
    text-decoration:none;
    color:#111;
    font-size:1.1rem;
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    z-index:999;
    background:rgba(0,0,0,.96);
    align-items:center;
    justify-content:center;
    padding:20px;
}

.lightbox.active{
    display:flex;
}

.lightbox img{
    max-width:100%;
    max-height:88vh;
    object-fit:contain;
}

.cerrar{
    position:fixed;
    top:22px;
    right:28px;
    color:#fff;
    font-size:2.2rem;
    cursor:pointer;
    font-family:Arial,sans-serif;
    z-index:1001;
}

.nav-btn{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    color:#fff;
    background:rgba(255,255,255,.12);
    border:none;
    width:48px;
    height:64px;
    font-size:3rem;
    line-height:1;
    cursor:pointer;
    z-index:1001;
}

.prev{
    left:16px;
}

.next{
    right:16px;
}

.contador{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-family:Arial,sans-serif;
    font-size:.9rem;
    letter-spacing:1px;
    z-index:1001;
}

@media(max-width:768px){
    header h1{
        font-size:2.8rem;
    }

    .galeria{
        grid-template-columns:1fr;
        padding:0 16px;
        gap:24px;
    }

    .nav-btn{
        width:42px;
        height:58px;
        font-size:2.4rem;
        background:rgba(255,255,255,.08);
    }

    .prev{
        left:6px;
    }

    .next{
        right:6px;
    }
}
</style>
</head>

<body>

<header>
    <h1>iPhone 4s</h1>
    <p>Transfer Filter Project</p>
</header>

<div class="galeria">
<img src="images/iphone4s/iphone4s-01.jpg">
<img src="images/iphone4s/iphone4s-02.jpg">
<img src="images/iphone4s/iphone4s-03.jpg">
<img src="images/iphone4s/iphone4s-04.jpg">
<img src="images/iphone4s/iphone4s-05.jpg">
<img src="images/iphone4s/iphone4s-06.jpg">
<img src="images/iphone4s/iphone4s-07.jpg">
<img src="images/iphone4s/iphone4s-08.jpg">
<img src="images/iphone4s/iphone4s-09.jpg">
<img src="images/iphone4s/iphone4s-10.jpg">
<img src="images/iphone4s/iphone4s-11.jpg">
<img src="images/iphone4s/iphone4s-12.jpg">
<img src="images/iphone4s/iphone4s-13.jpg">
<img src="images/iphone4s/iphone4s-14.jpg">
<img src="images/iphone4s/iphone4s-15.jpg">
<img src="images/iphone4s/iphone4s-16.jpg">
<img src="images/iphone4s/iphone4s-17.jpg">
<img src="images/iphone4s/iphone4s-18.jpg">
<img src="images/iphone4s/iphone4s-19.jpg">
<img src="images/iphone4s/iphone4s-20.jpg">
</div>

<a class="volver" href="index.html">← Volver</a>

<div class="lightbox" id="lightbox">
    <span class="cerrar" id="cerrar">×</span>
    <button class="nav-btn prev" id="prev">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button class="nav-btn next" id="next">›</button>
    <div class="contador" id="contador">1 / 20</div>
</div>

<script>
const imagenes = Array.from(document.querySelectorAll(".galeria img"));
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const cerrar = document.getElementById("cerrar");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
const contador = document.getElementById("contador");

let indiceActual = 0;
let touchStartX = 0;
let touchEndX = 0;

function abrirLightbox(indice){
    indiceActual = indice;
    actualizarImagen();
    lightbox.classList.add("active");
}

function cerrarLightbox(){
    lightbox.classList.remove("active");
}

function actualizarImagen(){
    lightboxImg.src = imagenes[indiceActual].src;
    contador.textContent = (indiceActual + 1) + " / " + imagenes.length;
}

function imagenAnterior(){
    indiceActual = (indiceActual - 1 + imagenes.length) % imagenes.length;
    actualizarImagen();
}

function imagenSiguiente(){
    indiceActual = (indiceActual + 1) % imagenes.length;
    actualizarImagen();
}

imagenes.forEach((img, index) => {
    img.addEventListener("click", () => abrirLightbox(index));
});

cerrar.addEventListener("click", cerrarLightbox);
prev.addEventListener("click", imagenAnterior);
next.addEventListener("click", imagenSiguiente);

lightbox.addEventListener("click", e => {
    if(e.target === lightbox){
        cerrarLightbox();
    }
});

document.addEventListener("keydown", e => {
    if(!lightbox.classList.contains("active")) return;

    if(e.key === "ArrowLeft") imagenAnterior();
    if(e.key === "ArrowRight") imagenSiguiente();
    if(e.key === "Escape") cerrarLightbox();
});

lightbox.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
});

lightbox.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    const diferencia = touchEndX - touchStartX;

    if(diferencia > 50) imagenAnterior();
    if(diferencia < -50) imagenSiguiente();
});
</script>

</body>
</html>
